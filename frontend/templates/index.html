{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<div class="container mt-4">
    <div class="mb-4">
        <h2 class="fw-bold">Live Emergency Map</h2>
        <p class="text-muted">Active emergency signals across Bulgaria</p>
    </div>

    <div id="map" style="height: 500px; 
    width: 100%; border-radius: 15px;
    background-color: #eee; border: 1px solid #ccc;">
    </div>
    <div class="text-center my-5">
        <button id="main-action-btn" 
                class="btn {% if has_active %}btn-resolved{% else %}btn-emergency{% endif %} px-5 py-3" 
                data-active="{{ 'true' if has_active else 'false' }}" 
                onclick="toggleEmergency()">
            
            {% if has_active %}
                ✅ RESOLVE EMERGENCY
            {% else %}
                ⚠️ EMERGENCY ⚠️
            {% endif %}
            
        </button>
    </div>
    <div class="row g-4 text-center mb-5">
        <div class="col-md-3">
            <div class="card-stat shadow-sm">
                <span class="stat-icon">👥</span>
                <h3 class="fw-bold">{{ stats.users }}</h3>
                <p class="text-muted mb-0">Registered Users</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-stat shadow-sm">
                <span class="stat-icon">⚠️</span>
                <h3 class="fw-bold">{{ stats.total_signals }}</h3>
                <p class="text-muted mb-0">Total Signals</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-stat shadow-sm">
                <span class="stat-icon">📈</span>
                <h3 class="fw-bold text-danger">{{ stats.active_signals }}</h3>
                <p class="text-muted mb-0">Active Signals</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-stat shadow-sm">
                <span class="stat-icon">🛡️</span>
                <h3 class="fw-bold">{{ stats.resolved }}</h3>
                <p class="text-muted mb-0">Resolved</p>
            </div>
        </div>
    </div>
</div>

<script>
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);
    setTimeout(function() {
        map.invalidateSize();
    }, 500);
    function sendEmergencySignal() {
        navigator.geolocation.getCurrentPosition((pos) => {
            fetch('/api/signal', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ lat: pos.coords.latitude, lng: pos.coords.longitude })
            }).then(() => location.reload());
        });
    }
</script>
{% endblock %}

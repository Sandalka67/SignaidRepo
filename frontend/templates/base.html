<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmaid - Emergency Aid</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        :root {
            --sig-red: #dc3545;
            --sig-dark: #212529;
        }

        .navbar {
            background-color: white !important;
            border-bottom: 1px solid #dee2e6;
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--sig-dark) !important;
        }

        .sig-logo-icon {
            background-color: var(--sig-red);
            color: white;
            padding: 5px 8px;
            border-radius: 8px;
            font-size: 1.2rem;
        }

        .nav-link {
            color: #6c757d !important;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-link:hover {
            color: var(--sig-red) !important;
        }

        /* Stats Card Styling */
        .card-stat {
            background: white;
            border: none;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .card-stat:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            background: #fff5f5;
            padding: 10px;
            border-radius: 10px;
        }

        /* Emergency Button */
        .btn-emergency {
            background-color: var(--sig-red);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 18px 45px;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3);
            transition: all 0.3s;
        }

        .btn-emergency:hover {
            background-color: #bb2d3b;
            transform: scale(1.05);
            color: white;
        }

        /* Health Tags */
        .condition-tag {
            background: #f1f3f5;
            border-radius: 50px;
            padding: 8px 16px;
            margin: 5px;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid transparent;
            display: inline-block;
        }

        .condition-tag.active {
            background: var(--sig-red);
            color: white;
        }

        #map {
            height: 500px;
            width: 100%;
            border-radius: 15px;
            border: 1px solid #dee2e6;
        }

        footer {
            margin-top: 50px;
            color: #adb5bd;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">
                <span class="sig-logo-icon">🛡️</span> Sigmaid
            </a>
            <div class="ms-auto d-flex align-items-center">
                <a class="nav-link me-4" href="/profile">👤 Profile</a>
                <a class="nav-link" href="#">↳ Log out</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center py-5">
        <hr class="w-25 mx-auto mb-4">
        © 2026 Sigmaid — Emergency aid for remote communities
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</body>
</html>

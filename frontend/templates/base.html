<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmaid - Emergency Aid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { 
            --sig-red:#dc3545;
        }
        .navbar-brand { 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
        }
        .sig-icon { 
            background: var(--sig-red); 
            color: white; border-radius: 8px; 
            padding: 5px 10px; 
            margin-right: 10px; 
        }
        .btn-emergency { 
            background-color: var(--sig-red); 
            color: white; 
            border-radius: 50px; 
            padding: 15px 40px; 
            font-weight: bold; 
            font-size: 1.2rem; 
        }
        .card-stat { 
            border-radius: 15px; 
            border: 1px solid #eee; 
            text-align: center;
            padding: 20px; 
        }
        #map { 
            height: 500px; 
            border-radius: 15px; 
        }
        .condition-tag {
            border-radius: 20px; 
            padding: 5px 15px; 
            margin: 5px; 
            cursor: pointer; 
            border: 1px solid #ddd; 
            background: #f8f9fa;
        }
        .condition-tag.active { 
            background: var(--sig-red);
            color: white; 
            border-color: var(--sig-red); 
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <span class="sig-icon">🛡️</span> Sigmaid
            </a>
            <div class="ms-auto d-flex align-items-center">
                <a href="/profile" class="nav-link me-3">👤 Profile</a>
                <a href="#" class="nav-link text-muted">↳ Log out</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center py-4 text-muted small">
        © 2026 Sigmaid — Emergency aid for remote communities
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="{{ url_for('static', filename='/mapimplementation.js') }}"></script>
    <script src="{{ url_for('static', filename='/interact.js') }}"></script>
</body>
</html>

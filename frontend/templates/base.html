<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signaid</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <style>
        body { 
            background-color: #f8f9fa; 
        }
        .navbar { 
            background-color: #ffffff; 
            border-bottom: 1px solid #eaeaea; 
        }
        .sig-logo-box {
            background-color: #e82a3d;
            border-radius: 6px;
            width: 38px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg py-3 shadow-sm">
        <div class="container">
            
            <a class="navbar-brand d-flex align-items-center text-dark" href="{{ url_for('index') }}" style="font-weight: 800; font-size: 1.35rem; letter-spacing: -0.5px;">
                <div class="sig-logo-box">
                    <svg width="16" height="18" viewBox="0 0 16 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 0L0 3.5V8.5C0 13.2 3.4 17.5 8 20C12.6 17.5 16 13.2 16 8.5V3.5L8 0Z" fill="#4dabf5"/>
                    </svg>
                </div>
                Signaid
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="ms-auto d-flex align-items-center">
                    {% if current_user.is_authenticated %}
                    <a href="{{ url_for('profile') }}" class="text-decoration-none text-dark me-4 d-flex align-items-center" style="font-size: 0.95rem;">
                        <span class="me-2" style="color: #4b367c; font-size: 1.1rem;">👤</span> Profile
                    </a>
                    <a href="{{ url_for('logout') }}" class="text-decoration-none text-muted d-flex align-items-center" style="font-size: 0.95rem;">
                        <span class="me-2" style="font-size: 1.1rem;">↳</span> Log out
                    </a>
                    {% endif %}
                </div>
            </div>
            
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center py-4 text-muted small mt-5">
        © 2026 Signaid — Emergency aid for remote communities
    </footer>

   <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="{{ url_for('static', filename='/mapimplementation.js') }}"></script>
    <script src="{{ url_for('static', filename='/interact.js') }}"></script>

</body>
</html>

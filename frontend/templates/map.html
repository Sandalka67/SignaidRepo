<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<div id="map"></div>

<script>
    var map = L.map('map').setView([42.7339, 25.4858], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    function loadSignals() {
        fetch('/api/signals')
            .then(response => response.json())
            .then(signals => {
                signals.forEach(sig => {
                    L.circleMarker([sig.lat, sig.lng], {
                        radius: 10,
                        fillColor: "#ff0000",
                        color: "#ffffff",
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    })
                    .addTo(map)
                    .bindPopup(`
                        <div style="text-align:center">
                            <b style="color:red">🚨 EMERGENCY</b><br>
                            <b>User:</b> ${sig.username}<br>
                            <b>Conditions:</b> ${sig.conditions}
                        </div>
                    `);
                });
            });
    }

    loadSignals();
</script>
